<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Continuum — an app builder, project engine and marketplace for bot work. A gateway into the Torii ecosystem." />
    <meta name="theme-color" content="#1a1613" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Continuum · project engine</title>

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@300,400,500,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <link rel="stylesheet" href="/src/styles/theme.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages.css" />
    <link rel="stylesheet" href="/src/styles/chat.css" />
    <link rel="stylesheet" href="/src/styles/landing.css" />
    <link rel="stylesheet" href="/src/styles/setup.css" />
    <script>
      // Honor a stored 'light' preference before first paint so users who
      // deliberately switched don't see a flash of dark. Dark stays default.
      try {
        var t = localStorage.getItem('continuum.theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
