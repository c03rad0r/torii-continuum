# Torii Continuum — Agent Configuration (example)
#
# Copy this file to `config.yaml` on the VPS, fill in the values, and never
# commit the real one. `config.yaml` is in .gitignore.
#
# Filesystem posture: this file lives under /home/continuum/agent/ (chmod 700).
# The `continuum` OS user runs the daemon. No other user can read it.

# ─────────────────────────────────────────────────────────────
# Admin identity
# ─────────────────────────────────────────────────────────────
#
# The npub allowed to log in. NIP-07 signature challenge is verified against
# this key. Nothing else is trusted — no password, no cookie, no OAuth.
#
# Only one admin in v1. Multi-admin is not on the roadmap.
#
admin_npub: "npub1REPLACE_WITH_YOUR_PLEBEIAN_SIGNER_NPUB"

# Session tokens are HMAC-signed with this secret. Generate with:
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
# Rotate any time; existing sessions become invalid.
session_secret: "REPLACE_WITH_32_BYTES_HEX"

# How long a session token stays valid (seconds). 24h default.
session_ttl_sec: 86400


# ─────────────────────────────────────────────────────────────
# HTTP server
# ─────────────────────────────────────────────────────────────
server:
  # Bind to localhost only. nginx does TLS termination in front.
  host: "127.0.0.1"
  port: 8787

  # CORS allowlist. Continuum Console lives here in prod.
  cors_origins:
    - "https://continuum-torii.pplx.app"
    - "http://localhost:5180"       # `npm run dev`
    - "http://127.0.0.1:5180"


# ─────────────────────────────────────────────────────────────
# Cashu wallet (on-VPS, pay-per-request float)
# ─────────────────────────────────────────────────────────────
#
# The agent holds a small Cashu balance to pay Routstr providers. Top up from
# Plebeian Signer's built-in wallet via POST /api/wallet/receive (admin only).
#
# Wallet data is stored under memory/wallet/ (chmod 700). Not committed. Not
# logged. If this file is destroyed the wallet is gone — treat it like cash.
#
cashu:
  # Mint(s) to use. First one is default for new mints; others accepted on receive.
  # Change these to Bitcoin-only, Chiefmonkey-trusted mints in production.
  mints:
    - "https://mint.minibits.cash/Bitcoin"
    - "https://mint.coinos.io"

  # Warn admin when balance drops below this many sats.
  low_balance_warn_sats: 500

  # Refuse to route new requests when balance drops below this. Protects against
  # runaway calls draining the float during a bug.
  hard_floor_sats: 100


# ─────────────────────────────────────────────────────────────
# Routstr (model layer)
# ─────────────────────────────────────────────────────────────
#
# Routstr is the OpenAI-compatible pay-per-request endpoint on Nostr. Each
# request is paid in Cashu tokens from the wallet above. No API key, no
# monthly bill, no custody.
#
# Provider set is pinned in config so a hostile relay can't route us to a bad
# provider. Fallback ladder is present but off by default — set `fallback: true`
# to allow automatic downgrade to the next entry when the primary fails.
#
routstr:
  # Discovery endpoint (OpenAI-compatible base URL for the primary).
  endpoint: "https://api.routstr.com"

  # Per-skill model pins. Skill name → model id (Routstr provider decides which
  # underlying provider serves it). "auto" defers to Routstr default routing.
  models:
    chat:      "deepseek-chat-v3"
    coding:    "deepseek-coder-v2"
    summarise: "llama-3.1-8b-instruct"
    routing:   "llama-3.1-8b-instruct"        # tiny "which skill?" classifier
    embed:     "auto"                         # v2 — not used in v1

  # Fallback ladder per skill. Ordered from strongest to cheapest. Off by
  # default (fallback: false); flip to true once we've validated the ladder
  # doesn't silently degrade quality.
  fallback:
    enabled: false
    coding:
      - "deepseek-coder-v2"
      - "qwen-2.5-coder-32b"
      - "qwen-2.5-coder-7b"
    chat:
      - "deepseek-chat-v3"
      - "llama-3.1-70b-instruct"
      - "llama-3.1-8b-instruct"

  # Hard limits per request. Protects the float from prompt-injection cost bombs.
  limits:
    max_tokens_out: 2048
    max_sats_per_request: 50


# ─────────────────────────────────────────────────────────────
# Ollama (optional local-model fallback — CONT-AGENT-1b)
# ─────────────────────────────────────────────────────────────
#
# Ollama runs a local LLM on the same VPS as the agent, listening on
# 127.0.0.1:11434. It is FREE (no sats) but slower and less capable than
# Routstr's frontier models. Use it as a fallback when:
#   - The Cashu float is empty (402 payment required)
#   - The Routstr endpoint is unreachable
#   - You want a fully offline mode (ollama_only strategy)
#
# Ollama is disabled by default. To enable:
#   1. On the VPS: curl -fsSL https://ollama.com/install.sh | sh
#   2. Pull a model: ollama pull llama3.2:3b
#   3. Bind to loopback: systemctl edit ollama.service
#      → [Service] Environment="OLLAMA_HOST=127.0.0.1:11434"
#   4. Set ollama.enabled: true below.
#
# See ops/README.md for the full installer runbook (Ansible role: ollama).
#
ollama:
  # Master switch. false = agent never touches Ollama, even if it's running.
  enabled: false

  # Where the Ollama daemon listens. Loopback only for security.
  endpoint: "http://127.0.0.1:11434"

  # Default model when a skill doesn't specify one.
  # Tier guide (Q4_K_M quantisation on CPU):
  #   llama3.2:3b     — 2 GB disk, ~3 GB RAM, ~15 tok/s on 2 vCPU  (recommended starter)
  #   llama3.1:8b     — 5 GB disk, ~6 GB RAM,  ~5 tok/s on 4 vCPU
  #   qwen2.5:7b      — 5 GB disk, ~6 GB RAM,  ~7 tok/s on 4 vCPU
  #   qwen2.5:14b     — 9 GB disk, ~10 GB RAM, ~2 tok/s on 4 vCPU  (GPU strongly advised)
  model: "llama3.2:3b"

  # Per-skill overrides. Fall back to `model` above when unset.
  models:
    chat:    "llama3.2:3b"
    reflect: "qwen2.5:7b"    # reflection is offline, can afford a bigger model

  # Ollama sampling knobs. Lower = more deterministic, better for reflection.
  temperature: 0.4

  # Per-request timeout. Slow CPUs on big models can push this; 60s is safe
  # for 3B, bump to 180s for 8B on 2 vCPU.
  timeout_ms: 60000


# ─────────────────────────────────────────────────────────────
# Model router (Routstr vs Ollama)
# ─────────────────────────────────────────────────────────────
#
# Decides which provider handles each chat turn. Strategies:
#
#   routstr_first  — try Routstr; on 402/payment-required or network error,
#                    fall back to Ollama if enabled. (RECOMMENDED)
#                    Sovereignty-preserving: paid frontier models by default,
#                    local models when the wallet's dry.
#
#   ollama_first   — try Ollama first (free, slower); fall back to Routstr on
#                    Ollama error. Cheap-but-slow default.
#
#   ollama_only    — never call Routstr. Fully offline mode. Requires
#                    ollama.enabled: true.
#
#   routstr_only   — never call Ollama, even on failure. Original behaviour
#                    before CONT-AGENT-1b.
#
model_router:
  strategy: "routstr_first"


# ─────────────────────────────────────────────────────────────
# Skills (v1)
# ─────────────────────────────────────────────────────────────
#
# Only these four exist in v1. Adding a skill is a code change + a config
# entry, not a config-only toggle. This is intentional — surface area is
# small on purpose.
#
skills:
  chat:
    enabled: true
    # Which memory paths the chat skill can read grounding from.
    read_paths:
      - "memory/notes/"
      - "memory/sessions/"

  brain_read:
    enabled: false   # v1: not yet — needs the Brain path baked into the agent
  brain_write:
    enabled: false   # v1: not yet
  todo_patch:
    enabled: false   # v1: not yet — needs mdPatch bridge to the Quest repo
  nostr_draft:
    enabled: false   # v1: not yet — first live skill after chat proves the loop


# ─────────────────────────────────────────────────────────────
# Character + memory stack (CONT-CHARACTER-1)
# ─────────────────────────────────────────────────────────────
#
# The character stack is sealed at rest with NIP-44 v2 to the operator's OWN
# npub. Decryption happens in the browser during /api/memory/unlock; the
# agent never holds a key. See agent/PRIVACY.md for the full storage map
# and agent/PANIC_KEY_SETUP.md for the emergency-wipe runbook.
#
character:
  # Path to CHARACTER.md relative to agent/. If missing, the chat skill
  # runs with the base skill instructions only.
  character_md: "CHARACTER.md"
  sources_md: "SOURCES.md"

  # If true, the chat skill refuses to serve any turn while the memory
  # cache is locked (no /api/memory/unlock has been called this boot).
  # If false (default), chat runs with a "memory locked" notice and
  # degrades gracefully.
  require_unlock: false

  # If the on-disk CHARACTER.md hash doesn't match the signed 30092
  # character_root, the chat skill emits a warning in the system prompt.
  # If true, chat outright refuses instead of warning.
  refuse_on_root_mismatch: false

reflect:
  # Auto-run reflection on a schedule (cron-style). Empty = manual only.
  # Reflection NEVER runs during a live chat turn, and NEVER signs.
  schedule: ""
  # Max drafts to propose per pass.
  limit_per_pass: 10

destructive:
  # Cooldown seconds between propose (30096) and enact.
  cooldown_sec: 60
  # Signatures required to enact a destructive_intent when no panic key
  # is loaded. Collapses to 1 when the 30097 panic key is present in
  # the memory cache.
  required_signatures: 2

panic_key:
  # The 30097 emergency-wipe authority is OPTIONAL. Wipes work fine without
  # one via the normal double-signature path above. Enabling this adds a
  # single-signature emergency override (see agent/PANIC_KEY_SETUP.md).
  #
  # false (default): no panic key expected. Chat and wipes run normally.
  # true:            a 30097 event may be unlocked into the cache to
  #                  collapse required_signatures to 1 for wipes.
  enabled: false

  # If true, /api/memory/unlock returns `panic_key_nudge: true` on the FIRST
  # unlock of a session that lacks a 30097 in the ciphertext store. The
  # Console shows a one-time card explaining the tradeoff. Skippable and
  # remembered per admin_npub. Set to false to silence the nudge entirely.
  nudge_on_first_unlock: true


# ─────────────────────────────────────────────────────────────
# Logging & cost accounting
# ─────────────────────────────────────────────────────────────
#
# NEVER log prompt bodies. NEVER log Cashu tokens. NEVER log session secrets.
# The cost log is a JSONL of accounting metadata only.
#
logging:
  # Where server logs go. `stdout` = systemd journal.
  destination: "stdout"
  level: "info"      # trace, debug, info, warn, error

  # Cost log path (per request). One line per completed Routstr call.
  cost_log: "memory/costs.jsonl"

  # Session log (auth events only — challenge issued, verify pass/fail, token exchange).
  # No PII, no message bodies.
  audit_log: "memory/audit.jsonl"
