---
all:
  hosts:
    continuum:
      ansible_host: "{{ lookup('env', 'CONTINUUM_VPS_IP') }}"
      ansible_user: "{{ lookup('env', 'CONTINUUM_VPS_USER') | default('root', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'CONTINUUM_SSH_KEY') | default('~/.ssh/id_ed25519', true) }}"
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ConnectTimeout=15"
