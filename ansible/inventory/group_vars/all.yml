---
# Continuum deployment — global variables
# Override these via env vars or group_vars/host_vars

# Domain setup
base_domain: "{{ lookup('env', 'BASE_DOMAIN') | default('example.com', true) }}"
continuum_domain: "{{ lookup('env', 'CONTINUUM_DOMAIN') | default('continuum.' + base_domain, true) }}"
continuum_agent_domain: "{{ lookup('env', 'CONTINUUM_AGENT_DOMAIN') | default('agent.' + base_domain, true) }}"

# ACME / TLS
acme_email: "{{ lookup('env', 'ACME_EMAIL') | default('admin@' + base_domain, true) }}"

# Cloudflare (optional — for DNS management)
cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"
cloudflare_zone_id: "{{ lookup('env', 'CLOUDFLARE_ZONE_ID') | default('', true) }}"

# Continuum agent
continuum_port: 8787
continuum_user: continuum
continuum_home: "/home/{{ continuum_user }}"
continuum_repo_url: "https://github.com/ChiefmonkeyArt/torii-continuum.git"
continuum_repo_branch: "main"
continuum_agent_dir: "{{ continuum_home }}/agent"
continuum_install_dir: "{{ continuum_agent_dir }}/repo/agent"
continuum_frontend_dir: "{{ continuum_agent_dir }}/frontend"
continuum_data_dir: "{{ continuum_agent_dir }}/data"
continuum_identity_dir: "{{ continuum_agent_dir }}/identity"

# Node.js
node_version: "20"

# Cashu mints (comma-separated in env, list in config)
continuum_cashu_mints:
  - "https://mint.minibits.cash/Bitcoin"
  - "https://mint.coinos.io"
continuum_low_balance_warn_sats: 500
continuum_hard_floor_sats: 100

# Routstr
continuum_routstr_endpoint: "https://api.routstr.com"
continuum_routstr_models:
  chat: "deepseek-chat-v3"
  coding: "deepseek-coder-v2"
  summarise: "llama-3.1-8b-instruct"
  routing: "llama-3.1-8b-instruct"
continuum_routstr_limits:
  max_tokens_out: 2048
  max_sats_per_request: 50

# Identity (generated by identity role if not provided)
continuum_admin_npub: "{{ lookup('env', 'CONTINUUM_ADMIN_NPUB') | default('', true) }}"
continuum_admin_nsec: "{{ lookup('env', 'CONTINUUM_ADMIN_NSEC') | default('', true) }}"
continuum_session_secret: "{{ lookup('env', 'CONTINUUM_SESSION_SECRET') | default('', true) }}"

# Caddy
caddy_install: true
caddy_binary_path: /usr/bin/caddy
caddy_config_dir: /etc/caddy
