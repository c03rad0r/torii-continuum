---
# System role — create user, ensure Node.js 20, create directories
# Idempotent: safe to run multiple times

- name: Create continuum system user
  user:
    name: "{{ continuum_user }}"
    system: true
    create_home: true
    home: "{{ continuum_home }}"
    shell: /bin/bash

- name: Set home directory permissions
  file:
    path: "{{ continuum_home }}"
    mode: "0750"
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"

- name: Create directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"
    mode: "0750"
  loop:
    - "{{ continuum_agent_dir }}"
    - "{{ continuum_data_dir }}"
    - "{{ continuum_identity_dir }}"
    - "{{ continuum_frontend_dir }}"

- name: Check if Node.js is installed
  command: node --version
  register: node_check
  changed_when: false
  ignore_errors: true

- name: Install Node.js 20 LTS (only if missing or wrong version)
  block:
    - name: Add NodeSource repository
      shell: curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true
  when: >
    node_check.failed or
    not node_check.stdout.startswith('v' ~ node_version)

- name: Verify Node.js version
  command: node --version
  register: node_version_final
  changed_when: false

- name: Display Node version
  debug:
    msg: "Node.js: {{ node_version_final.stdout }}"
