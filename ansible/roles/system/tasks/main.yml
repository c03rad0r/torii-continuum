---
# System role — create user, install Node 20, create directories

- name: Create continuum system user
  user:
    name: "{{ continuum_user }}"
    system: yes
    create_home: yes
    home: "{{ continuum_home }}"
    shell: /bin/bash

- name: Set home directory permissions
  file:
    path: "{{ continuum_home }}"
    mode: "0750"
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"

- name: Create directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"
    mode: "0750"
  loop:
    - "{{ continuum_agent_dir }}"
    - "{{ continuum_data_dir }}"
    - "{{ continuum_identity_dir }}"
    - "{{ continuum_frontend_dir }}"

- name: Install Node.js {{ node_version }} LTS (NodeSource)
  block:
    - name: Add NodeSource GPG key
      apt_key:
        url: "https://deb.nodesource.com/gpgkey/nodesource.gpg.key"
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ node_version }}.x {{ ansible_distribution_release }} main"
        state: present
        update_cache: yes

    - name: Install nodejs
      apt:
        name: nodejs
        state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: Verify Node.js version
  command: node --version
  register: node_version_check
  changed_when: false

- name: Display Node version
  debug:
    msg: "Node.js installed: {{ node_version_check.stdout }}"
