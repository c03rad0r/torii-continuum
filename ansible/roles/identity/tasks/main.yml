---
# Identity role — generate Nostr keypair + session secret if not provided

- name: Check for existing identity
  stat:
    path: "{{ continuum_identity_dir }}/secret.key"
  register: existing_identity

- name: Generate Nostr keypair (if not provided and not on disk)
  block:
    - name: Generate nsec via pynostr
      shell: |
        python3 -c "
        from pynostr.key import PrivateKey
        pk = PrivateKey()
        print(pk.bech32())
        "
      register: generated_nsec
      changed_when: false

    - name: Derive npub from generated nsec
      shell: |
        python3 -c "
        from pynostr.key import PrivateKey
        pk = PrivateKey('{{ generated_nsec.stdout }}')
        print(pk.public_key.bech32())
        "
      register: generated_npub
      changed_when: false

    - name: Set identity facts
      set_fact:
        continuum_admin_nsec_resolved: "{{ generated_nsec.stdout }}"
        continuum_admin_npub_resolved: "{{ generated_npub.stdout }}"
  when: >
    not existing_identity.stat.exists and
    continuum_admin_nsec | length == 0

- name: Use provided nsec (derive npub)
  block:
    - name: Derive npub from provided nsec
      shell: |
        python3 -c "
        from pynostr.key import PrivateKey
        pk = PrivateKey('{{ continuum_admin_nsec }}')
        print(pk.public_key.bech32())
        "
      register: provided_npub
      changed_when: false

    - name: Set identity facts from provided key
      set_fact:
        continuum_admin_nsec_resolved: "{{ continuum_admin_nsec }}"
        continuum_admin_npub_resolved: "{{ provided_npub.stdout }}"
  when: >
    not existing_identity.stat.exists and
    continuum_admin_nsec | length > 0

- name: Load existing identity from disk
  block:
    - name: Read existing nsec
      slurp:
        src: "{{ continuum_identity_dir }}/secret.key"
      register: existing_nsec_raw

    - name: Set identity facts from disk
      set_fact:
        continuum_admin_nsec_resolved: "{{ existing_nsec_raw.content | b64decode | trim }}"

    - name: Derive npub from stored nsec
      shell: |
        python3 -c "
        from pynostr.key import PrivateKey
        pk = PrivateKey('{{ continuum_admin_nsec_resolved }}')
        print(pk.public_key.bech32())
        "
      register: stored_npub
      changed_when: false

    - name: Set npub from stored key
      set_fact:
        continuum_admin_npub_resolved: "{{ stored_npub.stdout }}"
  when: existing_identity.stat.exists

- name: Generate session secret (if not provided)
  shell: "python3 -c \"import secrets; print(secrets.token_hex(32))\""
  register: generated_session_secret
  changed_when: false
  when: continuum_session_secret | length == 0

- name: Set session secret fact
  set_fact:
    continuum_session_secret_resolved: "{{ continuum_session_secret if continuum_session_secret | length > 0 else generated_session_secret.stdout }}"

- name: Save nsec to disk (mode 0600)
  copy:
    content: "{{ continuum_admin_nsec_resolved }}"
    dest: "{{ continuum_identity_dir }}/secret.key"
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"
    mode: "0600"
  when: not existing_identity.stat.exists

- name: Save npub to disk
  copy:
    content: "{{ continuum_admin_npub_resolved }}"
    dest: "{{ continuum_identity_dir }}/public.key"
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"
    mode: "0644"

- name: Save session secret (mode 0600)
  copy:
    content: "{{ continuum_session_secret_resolved }}"
    dest: "{{ continuum_identity_dir }}/session_secret"
    owner: "{{ continuum_user }}"
    group: "{{ continuum_user }}"
    mode: "0600"

- name: Display generated identity (ONE-TIME)
  debug:
    msg:
      - "========================================================"
      - "  CONTINUUM IDENTITY GENERATED — SAVE THIS INFORMATION"
      - "========================================================"
      - "Admin npub: {{ continuum_admin_npub_resolved }}"
      - "Admin nsec: {{ continuum_admin_nsec_resolved }}"
      - ""
      - "  ⚠️  The nsec above is your operator private key."
      - "  Import it into Plebeian Signer (or your NIP-07 signer)."
      - "  It is stored at: {{ continuum_identity_dir }}/secret.key"
      - "  NEVER share it. NEVER commit it."
      - "========================================================"
  when: not existing_identity.stat.exists
