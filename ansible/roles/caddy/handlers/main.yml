---
- name: reload caddy systemd
  systemd:
    name: caddy
    state: reloaded

- name: reload caddy docker
  shell: "docker exec $(docker ps --format '{{.Names}}' | grep -i caddy | head -1) caddy reload --config /etc/caddy/Caddyfile"

- name: reload caddy none
  systemd:
    name: caddy
    state: reloaded
